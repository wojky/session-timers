<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Session Timer</title>
    <meta name="description" content="Narzędzie dla koordynatorów do mierzenia czasu podczas wizytacji treningów — martwy czas, czas aktywny, coaching, tłumaczenie instrukcji." />
    <meta property="og:title" content="Session Timer" />
    <meta property="og:description" content="Narzędzie dla koordynatorów do mierzenia czasu podczas wizytacji treningów — martwy czas, czas aktywny, coaching, tłumaczenie instrukcji." />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Inter", "sans-serif"] },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      .timer-card.active {
        box-shadow: 0 0 0 3px #6366f1;
      }
      .timer-display:focus {
        outline: 2px solid #6366f1;
        outline-offset: 2px;
      }
      .timer-card {
        min-height: 0;
      }
      /* Session info panel collapse — CSS Grid trick */
      #session-panel {
        display: grid;
        grid-template-rows: 1fr;
        transition: grid-template-rows 0.3s ease;
      }
      #session-panel.collapsed {
        grid-template-rows: 0fr;
      }
      #session-chevron {
        transition: transform 0.3s ease;
      }
      #session-chevron.rotate {
        transform: rotate(180deg);
      }
    </style>
  </head>
  <body
    class="h-dvh overflow-hidden flex flex-col bg-slate-900 text-slate-100 font-sans p-3 gap-3"
  >
    <!-- Header -->
    <header class="flex-shrink-0 flex items-center">
      <div>
        <h1 class="text-lg font-bold text-slate-100 leading-tight">
          Session Timer
        </h1>
        <p class="text-slate-400 text-xs">Koordynator · Wizytacja treningu</p>
      </div>
    </header>

    <!-- Session info (collapsible) -->
    <section
      class="flex-shrink-0 bg-slate-800 rounded-2xl border border-slate-700 overflow-hidden"
    >
      <button
        id="session-toggle"
        class="w-full flex items-center justify-between px-4 py-3 text-left hover:bg-slate-700/50 transition-colors"
        aria-expanded="true"
        aria-controls="session-panel"
      >
        <span
          class="text-xs font-semibold text-slate-400 uppercase tracking-wider"
          >Informacje o treningu</span
        >
        <svg
          id="session-chevron"
          class="w-4 h-4 text-slate-400 flex-shrink-0"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="6 9 12 15 18 9" />
        </svg>
      </button>
      <div id="session-panel">
        <div class="overflow-hidden">
          <div class="px-4 pb-3 flex flex-row gap-3">
            <div class="flex flex-col gap-1 flex-1">
              <label
                for="session-date"
                class="text-xs text-slate-300 font-medium"
                >Data treningu</label
              >
              <input
                id="session-date"
                type="date"
                class="bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-slate-100 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
              />
            </div>
            <div class="flex flex-col gap-1 flex-1">
              <label
                for="session-time"
                class="text-xs text-slate-300 font-medium"
                >Godzina treningu</label
              >
              <input
                id="session-time"
                type="time"
                class="bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-slate-100 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
              />
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Timers grid -->
    <main
      class="flex-1 min-h-0 flex flex-col gap-3 max-w-[720px] w-full mx-auto"
      id="timers-container"
    >
      <!-- Timer: Martwy czas -->
      <div
        class="timer-card flex-1 flex flex-col justify-between bg-slate-800 rounded-2xl px-4 py-3 border border-slate-700 transition-all duration-200"
        data-timer-id="dead"
      >
        <div class="flex items-center justify-between mb-2">
          <span
            class="text-xs font-semibold uppercase tracking-wider text-slate-400"
            >Martwy czas</span
          >
          <div class="flex items-center gap-2">
            <span class="timer-status-badge text-xs font-medium text-slate-500"
              >Zatrzymany</span
            >
            <div
              class="w-2.5 h-2.5 rounded-full bg-slate-600 timer-indicator"
            ></div>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <input
            type="text"
            class="timer-display flex-1 min-w-0 text-center text-2xl font-bold tracking-widest bg-transparent border border-slate-600 rounded-xl py-2 text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 hover:border-slate-500 transition-colors"
            value="00:00"
            maxlength="5"
            aria-label="Czas: Martwy czas"
          />
          <button
            class="timer-toggle flex items-center justify-center gap-1.5 bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-semibold text-sm px-4 py-2.5 rounded-xl transition-colors flex-shrink-0"
          >
            <svg
              class="icon-play w-4 h-4"
              viewBox="0 0 24 24"
              fill="currentColor"
            >
              <path d="M8 5v14l11-7z" />
            </svg>
            <svg
              class="icon-pause w-4 h-4 hidden"
              viewBox="0 0 24 24"
              fill="currentColor"
            >
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
            </svg>
            <span class="toggle-label">Start</span>
          </button>
          <button
            class="timer-reset p-2.5 rounded-xl border border-slate-600 text-slate-400 hover:text-red-400 hover:border-red-500 transition-colors flex-shrink-0"
            aria-label="Resetuj"
            title="Resetuj timer"
          >
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"
              />
            </svg>
          </button>
        </div>
      </div>

      <!-- Timer: Czas aktywny -->
      <div
        class="timer-card flex-1 flex flex-col justify-between bg-slate-800 rounded-2xl px-4 py-3 border border-slate-700 transition-all duration-200"
        data-timer-id="active"
      >
        <div class="flex items-center justify-between mb-2">
          <span
            class="text-xs font-semibold uppercase tracking-wider text-slate-400"
            >Czas aktywny</span
          >
          <div class="flex items-center gap-2">
            <span class="timer-status-badge text-xs font-medium text-slate-500"
              >Zatrzymany</span
            >
            <div
              class="w-2.5 h-2.5 rounded-full bg-slate-600 timer-indicator"
            ></div>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <input
            type="text"
            class="timer-display flex-1 min-w-0 text-center text-2xl font-bold tracking-widest bg-transparent border border-slate-600 rounded-xl py-2 text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 hover:border-slate-500 transition-colors"
            value="00:00"
            maxlength="5"
            aria-label="Czas: Czas aktywny"
          />
          <button
            class="timer-toggle flex items-center justify-center gap-1.5 bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-semibold text-sm px-4 py-2.5 rounded-xl transition-colors flex-shrink-0"
          >
            <svg
              class="icon-play w-4 h-4"
              viewBox="0 0 24 24"
              fill="currentColor"
            >
              <path d="M8 5v14l11-7z" />
            </svg>
            <svg
              class="icon-pause w-4 h-4 hidden"
              viewBox="0 0 24 24"
              fill="currentColor"
            >
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
            </svg>
            <span class="toggle-label">Start</span>
          </button>
          <button
            class="timer-reset p-2.5 rounded-xl border border-slate-600 text-slate-400 hover:text-red-400 hover:border-red-500 transition-colors flex-shrink-0"
            aria-label="Resetuj"
            title="Resetuj timer"
          >
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"
              />
            </svg>
          </button>
        </div>
      </div>

      <!-- Timer: Coaching -->
      <div
        class="timer-card flex-1 flex flex-col justify-between bg-slate-800 rounded-2xl px-4 py-3 border border-slate-700 transition-all duration-200"
        data-timer-id="coaching"
      >
        <div class="flex items-center justify-between mb-2">
          <span
            class="text-xs font-semibold uppercase tracking-wider text-slate-400"
            >Coaching</span
          >
          <div class="flex items-center gap-2">
            <span class="timer-status-badge text-xs font-medium text-slate-500"
              >Zatrzymany</span
            >
            <div
              class="w-2.5 h-2.5 rounded-full bg-slate-600 timer-indicator"
            ></div>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <input
            type="text"
            class="timer-display flex-1 min-w-0 text-center text-2xl font-bold tracking-widest bg-transparent border border-slate-600 rounded-xl py-2 text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 hover:border-slate-500 transition-colors"
            value="00:00"
            maxlength="5"
            aria-label="Czas: Coaching"
          />
          <button
            class="timer-toggle flex items-center justify-center gap-1.5 bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-semibold text-sm px-4 py-2.5 rounded-xl transition-colors flex-shrink-0"
          >
            <svg
              class="icon-play w-4 h-4"
              viewBox="0 0 24 24"
              fill="currentColor"
            >
              <path d="M8 5v14l11-7z" />
            </svg>
            <svg
              class="icon-pause w-4 h-4 hidden"
              viewBox="0 0 24 24"
              fill="currentColor"
            >
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
            </svg>
            <span class="toggle-label">Start</span>
          </button>
          <button
            class="timer-reset p-2.5 rounded-xl border border-slate-600 text-slate-400 hover:text-red-400 hover:border-red-500 transition-colors flex-shrink-0"
            aria-label="Resetuj"
            title="Resetuj timer"
          >
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"
              />
            </svg>
          </button>
        </div>
      </div>

      <!-- Timer: Tłumaczenie instrukcji -->
      <div
        class="timer-card flex-1 flex flex-col justify-between bg-slate-800 rounded-2xl px-4 py-3 border border-slate-700 transition-all duration-200"
        data-timer-id="instructions"
      >
        <div class="flex items-center justify-between mb-2">
          <span
            class="text-xs font-semibold uppercase tracking-wider text-slate-400"
            >Tłumaczenie instrukcji</span
          >
          <div class="flex items-center gap-2">
            <span class="timer-status-badge text-xs font-medium text-slate-500"
              >Zatrzymany</span
            >
            <div
              class="w-2.5 h-2.5 rounded-full bg-slate-600 timer-indicator"
            ></div>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <input
            type="text"
            class="timer-display flex-1 min-w-0 text-center text-2xl font-bold tracking-widest bg-transparent border border-slate-600 rounded-xl py-2 text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 hover:border-slate-500 transition-colors"
            value="00:00"
            maxlength="5"
            aria-label="Czas: Tłumaczenie instrukcji"
          />
          <button
            class="timer-toggle flex items-center justify-center gap-1.5 bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-semibold text-sm px-4 py-2.5 rounded-xl transition-colors flex-shrink-0"
          >
            <svg
              class="icon-play w-4 h-4"
              viewBox="0 0 24 24"
              fill="currentColor"
            >
              <path d="M8 5v14l11-7z" />
            </svg>
            <svg
              class="icon-pause w-4 h-4 hidden"
              viewBox="0 0 24 24"
              fill="currentColor"
            >
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
            </svg>
            <span class="toggle-label">Start</span>
          </button>
          <button
            class="timer-reset p-2.5 rounded-xl border border-slate-600 text-slate-400 hover:text-red-400 hover:border-red-500 transition-colors flex-shrink-0"
            aria-label="Resetuj"
            title="Resetuj timer"
          >
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"
              />
            </svg>
          </button>
        </div>
      </div>
    </main>

    <!-- Confirm Reset Modal -->
    <div
      id="reset-modal"
      class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
    >
      <div
        class="bg-slate-800 border border-slate-700 rounded-2xl p-6 max-w-sm w-full shadow-2xl"
      >
        <h3 id="modal-title" class="text-lg font-semibold text-slate-100 mb-2">
          Resetować timer?
        </h3>
        <p class="text-slate-400 text-sm mb-6">
          Ta operacja wyzeruje czas. Czy na pewno chcesz kontynuować?
        </p>
        <div class="flex gap-3 justify-end">
          <button
            id="modal-cancel"
            class="px-4 py-2 rounded-xl border border-slate-600 text-slate-300 hover:text-slate-100 hover:border-slate-500 text-sm font-medium transition-colors"
          >
            Anuluj
          </button>
          <button
            id="modal-confirm"
            class="px-4 py-2 rounded-xl bg-red-600 hover:bg-red-500 text-white text-sm font-semibold transition-colors"
          >
            Resetuj
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
