<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#1e293b"/>
  <!-- Stopwatch body -->
  <circle cx="16" cy="18" r="9" fill="none" stroke="#6366f1" stroke-width="2.2"/>
  <!-- Crown / top -->
  <rect x="13.5" y="7" width="5" height="2" rx="1" fill="#6366f1"/>
  <!-- Button top -->
  <rect x="15.2" y="5" width="1.6" height="3" rx="0.8" fill="#6366f1"/>
  <!-- Side button -->
  <rect x="23" y="11" width="2.5" height="1.5" rx="0.75" fill="#6366f1" transform="rotate(-35 23 11)"/>
  <!-- Clock hands -->
  <line x1="16" y1="18" x2="16" y2="12.5" stroke="#f8fafc" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="16" y1="18" x2="20" y2="20" stroke="#f8fafc" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="18" r="1.2" fill="#6366f1"/>
</svg>
